# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  color: indigo

# SEO
marketing:
  seo:
    site_type: Organization
    local_business_type: 'Research Institute'
    org_name: 'RCL Group'
    description: 'Robotics Cognition and Learning (RCL) Group at MBZUAI, led by Prof. Xingxing Zuo. Research in robot perception, 3D vision, spatial AI, and embodied AI.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    block: 'navbar'
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: 'RCL Group'

# Site footer
footer:
  copyright:
    notice: '© {year} RCL Group, MBZUAI. All rights reserved.'
    license:
      enable: false
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false

# Disable social sharing buttons on pages
share: false
sharing: false

# Custom CSS
extensions:
  css:
    - custom
